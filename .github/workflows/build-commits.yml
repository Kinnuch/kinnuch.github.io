name: Build commits.json

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: build-commits
      cancel-in-progress: true
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate commits.json
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets/data
          # Tab-separated; jq splits on real tabs. Tabs in commit subjects are
          # rare enough we accept the trade for shell simplicity.
          git log --no-merges --date=iso-strict \
            --pretty=format:'%H%x09%h%x09%cI%x09%an%x09%s' \
            | jq -R -s '
                split("\n")
                | map(select(length > 0))
                | map(split("\t"))
                | map({
                    hash: .[0],
                    short: .[1],
                    date: .[2],
                    author: .[3],
                    msg: (.[4:] | join("\t"))
                  })
              ' > assets/data/commits.json
          echo "Wrote $(jq length assets/data/commits.json) commits"

      - name: Commit and push if changed
        shell: bash
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          if git diff --quiet -- assets/data/commits.json; then
            echo "No changes."
            exit 0
          fi
          git add assets/data/commits.json
          git commit -m "chore: refresh commits.json [skip ci]"
          git push
